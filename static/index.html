<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FS Care — Drug Request Portal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--blue-dark:#0C447C;--blue-bg:#E6F1FB;--green:#3B6D11;--green-bg:#EAF3DE;--red:#A32D2D;--red-bg:#FCEBEB;--amber:#854F0B;--amber-bg:#FAEEDA;--border:#e0e2e8;--bg:#fff;--bg2:#f6f7f9;--text:#1a1a1a;--text2:#666;--text3:#999}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;padding:24px 16px 60px}
.shell{max-width:920px;margin:0 auto}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);font-family:inherit;transition:all .15s}
.btn:hover:not(:disabled){background:var(--bg2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover:not(:disabled){background:var(--blue-dark)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{color:var(--red);border-color:var(--red-bg)}
input,select,textarea{width:100%;padding:9px 11px;font-size:14px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:inherit;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
.b-pending{background:var(--amber-bg);color:var(--amber)}.b-processing{background:var(--blue-bg);color:var(--blue)}
.b-fulfilled{background:var(--green-bg);color:var(--green)}.b-cancelled{background:var(--red-bg);color:var(--red)}
.b-urgent{background:var(--red-bg);color:var(--red)}.b-normal{background:var(--bg2);color:var(--text2)}
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:8px;padding:4px;width:fit-content;border:1px solid var(--border);margin-bottom:16px}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.tab.on{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.hr{height:1px;background:var(--border);margin:14px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid5{display:grid;grid-template-columns:2fr 80px 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:si .25s ease}
.t-ok{background:var(--green);color:#EAF3DE}.t-err{background:var(--red);color:#FCEBEB}
@keyframes si{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;transition:background .3s}
.dot-ok{background:var(--green)}.dot-err{background:var(--red)}.dot-spin{background:var(--amber);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:ro .7s linear infinite}
.spinner-dark{border-color:var(--border);border-top-color:var(--text2)}
@keyframes ro{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.warn{background:var(--red-bg);color:var(--red);font-size:12px;padding:10px 14px;border-radius:6px;line-height:1.7;margin-bottom:12px}
.info-box{background:var(--blue-bg);color:var(--blue);font-size:12px;padding:9px 12px;border-radius:6px;line-height:1.6;margin-top:8px}
.tag{display:inline-block;background:var(--bg2);border-radius:4px;padding:2px 8px;margin-right:6px;margin-bottom:4px;font-size:13px}
.hidden{display:none}
#app{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const CATS = ['Antibiotics','Analgesics','Antihypertensives','Antidiabetics','Vitamins & Supplements','IV Fluids','Surgical Supplies','Diagnostic Kits','Vaccines','Other'];
const UNITS = ['Tablets','Capsules','Vials','Bottles','Sachets','Boxes','Units','Packs'];
const HOSPS = ['General Hospital Lagos','Island General Hospital','Apapa Specialist Hospital','St. Nicholas Hospital','Lagos University Teaching Hospital'];

let state = {
  apiUrl: window.location.origin,  // auto-detects Railway URL
  apiStatus: 'checking',   // checking | ok | err
  mainView: 'hospital',    // hospital | admin
  hospTab: 'form',         // form | track
  adminTab: 'list',        // list | detail
  form: blankForm(),
  trackEmail: '',
  requests: [],
  allRequests: [],
  stats: null,
  selectedReq: null,
  adminNote: '',
  adminStatus: 'pending',
  busy: false,
  toastTimer: null,
};

function blankForm() {
  return { hospital:'', contact:'', email:'', phone:'', priority:'normal', notes:'', items:[blankItem()] };
}
function blankItem() {
  return { name:'', qty:'', unit:'Tablets', category:'Antibiotics' };
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(state.apiUrl + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'API error');
  return data;
}

async function pingHealth() {
  setState({ apiStatus: 'checking' });
  try { await apiFetch('GET', '/health'); setState({ apiStatus: 'ok' }); }
  catch { setState({ apiStatus: 'err' }); }
}

async function submitRequest() {
  const f = state.form;
  // Validate email format
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email);
  if (!f.hospital || !f.contact || !f.email || !emailOk) {
    showToast('Please fill in hospital, contact and a valid email', 'err'); return;
  }
  if (f.items.length === 0 || f.items.some(it => !it.name || !it.qty || parseInt(it.qty) < 1)) {
    showToast('Please fill in all item names and quantities', 'err'); return;
  }
  setState({ busy: true });
  try {
    const payload = {
      hospital: f.hospital.trim(),
      contact:  f.contact.trim(),
      email:    f.email.trim(),
      phone:    (f.phone || '').trim(),
      priority: f.priority || 'normal',
      notes:    (f.notes || '').trim(),
      items:    f.items.map(it => ({
        name:     it.name.trim(),
        qty:      parseInt(it.qty, 10),
        unit:     it.unit || 'Tablets',
        category: it.category || 'Other',
      }))
    };
    const res = await apiFetch('POST', '/requests', payload);
    showToast(res.request_id + ' submitted! FS Care notified by email.');
    const savedEmail = f.email;
    setState({ form: blankForm(), trackEmail: savedEmail, hospTab: 'track', busy: false });
    loadHospRequests();
  } catch(e) { showToast(e.message, 'err'); setState({ busy: false }); }
}

async function loadHospRequests() {
  if (!state.trackEmail) { showToast('Enter your hospital email', 'err'); return; }
  setState({ busy: true });
  try {
    const data = await apiFetch('GET', '/requests/hospital/' + encodeURIComponent(state.trackEmail));
    setState({ requests: data, busy: false });
    if (!data.length) showToast('No requests found for this email', 'err');
  } catch(e) { showToast(e.message, 'err'); setState({ busy: false }); }
}

async function loadAdmin() {
  setState({ busy: true });
  try {
    const [reqs, stats] = await Promise.all([
      apiFetch('GET', '/admin/requests'),
      apiFetch('GET', '/admin/stats')
    ]);
    setState({ allRequests: reqs, stats, busy: false });
  } catch(e) { showToast(e.message, 'err'); setState({ busy: false }); }
}

async function actionRequest() {
  setState({ busy: true });
  try {
    const id = state.selectedReq.id;
    await apiFetch('PATCH', '/admin/requests/' + id + '/action', {
      status: state.adminStatus, admin_note: state.adminNote
    });
    showToast('Request ' + id + ' updated. Hospital notified by email.');
    setState({ adminTab: 'list', selectedReq: null, busy: false });
    loadAdmin();
  } catch(e) { showToast(e.message, 'err'); setState({ busy: false }); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setState(patch) {
  Object.assign(state, patch);
  render();
}

function showToast(msg, type = 'ok') {
  clearTimeout(state.toastTimer);
  const el = document.getElementById('toast');
  if (el) el.remove();
  const t = document.createElement('div');
  t.id = 'toast';
  t.className = 'toast ' + (type === 'ok' ? 't-ok' : 't-err');
  t.innerHTML = `<i class="ti ${type==='ok'?'ti-circle-check':'ti-alert-circle'}" style="font-size:16px"></i>${msg}`;
  document.body.appendChild(t);
  state.toastTimer = setTimeout(() => t.remove(), 3500);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function sbadge(s) {
  const cls = { pending:'b-pending', processing:'b-processing', fulfilled:'b-fulfilled', cancelled:'b-cancelled' };
  const ico = { pending:'ti-clock', processing:'ti-refresh', fulfilled:'ti-circle-check', cancelled:'ti-x' };
  return `<span class="badge ${cls[s]||'b-pending'}"><i class="ti ${ico[s]||'ti-clock'}" style="font-size:10px"></i>${cap(s)}</span>`;
}
function pbadge(p) {
  return p === 'urgent'
    ? `<span class="badge b-urgent"><i class="ti ti-alert-triangle" style="font-size:10px"></i>Urgent</span>`
    : `<span class="badge b-normal">Normal</span>`;
}
function cap(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  const dotCls = state.apiStatus === 'ok' ? 'dot-ok' : state.apiStatus === 'err' ? 'dot-err' : 'dot-spin';
  const dotLbl = state.apiStatus === 'ok' ? '● Live' : state.apiStatus === 'err' ? '● Offline' : 'Checking…';
  const dotColor = state.apiStatus === 'ok' ? 'var(--green)' : state.apiStatus === 'err' ? 'var(--red)' : 'var(--text3)';

  return `
  <div>
    <!-- Header -->
    <div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:42px;height:42px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="ti ti-heart-rate-monitor" style="color:#fff;font-size:22px"></i>
        </div>
        <div>
          <div style="font-weight:700;font-size:17px">FS Care — Drug Request Portal</div>
          <div style="font-size:12px;color:var(--text2)">First Sterling Pharmacy</div>
        </div>
      </div>

      <!-- API bar -->
      <div class="card" style="display:flex;align-items:center;gap:8px;padding:9px 14px;margin-bottom:10px">
        <span class="dot ${dotCls}"></span>
        <input id="apiInput" value="${state.apiUrl}" placeholder="API URL"
          style="border:none;background:transparent;font-size:13px;flex:1;padding:0;box-shadow:none"/>
        <button class="btn btn-sm" onclick="connectApi()">Connect</button>
        <span style="font-size:11px;flex-shrink:0;color:${dotColor}">${dotLbl}</span>
      </div>

      ${state.apiStatus === 'err' ? `
      <div class="warn">
        ⚠ Can't reach the API. Start your FastAPI server:<br>
        <code>cd fscare-api &amp;&amp; uvicorn app.main:app --reload</code><br>
        Then click Connect. Once deployed on Railway, paste your Railway URL above.
      </div>` : ''}

      <!-- Main tabs -->
      <div class="tabs">
        <button class="tab ${state.mainView==='hospital'?'on':''}" onclick="setView('hospital')">
          <i class="ti ti-building-hospital" style="font-size:14px"></i>Hospital Portal
        </button>
        <button class="tab ${state.mainView==='admin'?'on':''}" onclick="setView('admin')">
          <i class="ti ti-shield-check" style="font-size:14px"></i>FS Care Admin
        </button>
      </div>
    </div>

    ${state.mainView === 'hospital' ? buildHospital() : buildAdmin()}
  </div>`;
}

// ── Hospital ──────────────────────────────────────────────────────────────────
function buildHospital() {
  return `
  <div class="tabs">
    <button class="tab ${state.hospTab==='form'?'on':''}" onclick="setHospTab('form')">
      <i class="ti ti-plus" style="font-size:13px"></i>New Request
    </button>
    <button class="tab ${state.hospTab==='track'?'on':''}" onclick="setHospTab('track')">
      <i class="ti ti-list-check" style="font-size:13px"></i>Track Requests
    </button>
  </div>
  ${state.hospTab === 'form' ? buildForm() : buildTrack()}`;
}

function buildForm() {
  const f = state.form;
  return `
  <div class="card">
    <div style="font-weight:600;font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-building-hospital" style="color:var(--blue)"></i>Hospital Details
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div>
        <label>Hospital name *</label>
        <input id="f_hospital" list="hlist" placeholder="Select or type" value="${f.hospital}" oninput="updForm('hospital',this.value)"/>
        <datalist id="hlist">${HOSPS.map(h=>`<option value="${h}"/>`).join('')}</datalist>
      </div>
      <div>
        <label>Contact person *</label>
        <input id="f_contact" placeholder="Dr. / Pharmacist name" value="${f.contact}" oninput="updForm('contact',this.value)"/>
      </div>
      <div>
        <label>Email address *</label>
        <input id="f_email" type="email" placeholder="email@hospital.ng" value="${f.email}" oninput="updForm('email',this.value)"/>
      </div>
      <div>
        <label>Phone</label>
        <input id="f_phone" placeholder="080XXXXXXXX" value="${f.phone}" oninput="updForm('phone',this.value)"/>
      </div>
    </div>
    <div class="grid2">
      <div>
        <label>Priority</label>
        <select onchange="updForm('priority',this.value)">
          <option value="normal" ${f.priority==='normal'?'selected':''}>Normal</option>
          <option value="urgent" ${f.priority==='urgent'?'selected':''}>Urgent</option>
        </select>
      </div>
      <div>
        <label>Notes</label>
        <input placeholder="Special instructions..." value="${f.notes}" oninput="updForm('notes',this.value)"/>
      </div>
    </div>
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <span style="display:flex;align-items:center;gap:8px"><i class="ti ti-pill" style="color:var(--blue)"></i>Items Requested</span>
      <button class="btn btn-sm" onclick="addItem()"><i class="ti ti-plus" style="font-size:12px"></i>Add item</button>
    </div>
    ${f.items.map((it, i) => `
    <div class="grid5">
      <div>${i===0?'<label>Drug / Item name *</label>':''}<input placeholder="e.g. Amoxicillin 500mg" value="${it.name}" oninput="updItem(${i},'name',this.value)"/></div>
      <div>${i===0?'<label>Qty *</label>':''}<input type="number" min="1" placeholder="100" value="${it.qty}" oninput="updItem(${i},'qty',this.value)"/></div>
      <div>${i===0?'<label>Unit</label>':''}<select onchange="updItem(${i},'unit',this.value)">${UNITS.map(u=>`<option ${it.unit===u?'selected':''}>${u}</option>`).join('')}</select></div>
      <div>${i===0?'<label>Category</label>':''}<select onchange="updItem(${i},'category',this.value)">${CATS.map(c=>`<option ${it.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div style="padding-top:${i===0?19:0}px">${f.items.length>1?`<button class="btn btn-danger" style="padding:8px 9px" onclick="remItem(${i})"><i class="ti ti-trash" style="font-size:13px"></i></button>`:''}</div>
    </div>`).join('')}
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px">
    <button class="btn" onclick="clearForm()">Clear</button>
    <button class="btn btn-primary" onclick="submitRequest()" ${state.busy||state.apiStatus!=='ok'?'disabled':''}>
      ${state.busy ? '<span class="spinner"></span>Submitting…' : '<i class="ti ti-send" style="font-size:13px"></i>Submit Request'}
    </button>
  </div>`;
}

function buildTrack() {
  return `
  <div class="card" style="display:flex;gap:8px;align-items:flex-end">
    <div style="flex:1">
      <label>Hospital email — to load your requests</label>
      <input type="email" placeholder="email@hospital.ng" value="${state.trackEmail}"
        oninput="state.trackEmail=this.value"
        onkeydown="if(event.key==='Enter')loadHospRequests()"/>
    </div>
    <button class="btn btn-primary" onclick="loadHospRequests()" ${state.busy?'disabled':''}>
      ${state.busy?'<span class="spinner"></span>Loading…':'<i class="ti ti-search" style="font-size:13px"></i>Load'}
    </button>
  </div>

  ${state.requests.length === 0 ? `
  <div class="empty">
    <i class="ti ti-inbox" style="font-size:40px;display:block;margin-bottom:10px"></i>
    Enter your email above and click Load
  </div>` : state.requests.map(r => `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-weight:700;font-size:14px">${r.id}</span>
          ${sbadge(r.status)} ${pbadge(r.priority)}
        </div>
        <div style="font-size:13px;color:var(--text2)">${r.hospital} · ${r.contact}</div>
      </div>
      <div style="font-size:12px;color:var(--text3)">${fmtDate(r.date_submitted)}</div>
    </div>
    <div>${r.items.map(it=>`<span class="tag">${it.qty} ${it.unit} ${it.name}</span>`).join('')}</div>
    ${r.admin_note ? `<div class="info-box"><i class="ti ti-info-circle" style="font-size:12px;margin-right:4px"></i><strong>FS Care: </strong>${r.admin_note}</div>` : ''}
  </div>`).join('')}`;
}

// ── Admin ─────────────────────────────────────────────────────────────────────
function buildAdmin() {
  if (state.adminTab === 'detail' && state.selectedReq) return buildDetail();

  const s = state.stats;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-weight:700;font-size:15px">All Requests</span>
    <button class="btn" onclick="loadAdmin()" ${state.busy?'disabled':''} style="font-size:13px">
      ${state.busy?'<span class="spinner spinner-dark"></span>Loading…':'<i class="ti ti-refresh" style="font-size:14px"></i>Refresh'}
    </button>
  </div>

  ${s ? `
  <div class="stat-grid">
    ${[['Pending',s.pending,'var(--amber)'],['Processing',s.processing,'var(--blue)'],['Fulfilled',s.fulfilled,'var(--green)'],['Urgent',s.urgent_pending,'var(--red)']].map(([l,v,c])=>`
    <div class="stat-card">
      <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${l}</div>
      <div style="font-size:28px;font-weight:700;color:${c}">${v}</div>
    </div>`).join('')}
  </div>` : ''}

  ${state.allRequests.length === 0 ? `
  <div class="empty">
    <i class="ti ti-inbox" style="font-size:40px;display:block;margin-bottom:10px"></i>
    ${state.apiStatus === 'ok' ? 'No requests yet' : 'Connect to the API to load requests'}
  </div>` : `
  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th>ID</th><th>Hospital</th><th>Date</th><th>Items</th><th>Priority</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>
        ${state.allRequests.map((r,i) => `
        <tr>
          <td style="font-weight:700;font-size:13px">${r.id}</td>
          <td style="font-size:13px"><div>${r.hospital}</div><div style="font-size:11px;color:var(--text2)">${r.contact}</div></td>
          <td style="font-size:12px;color:var(--text2)">${fmtDate(r.date_submitted)}</td>
          <td style="font-size:13px">${r.items.length} item${r.items.length!==1?'s':''}</td>
          <td>${pbadge(r.priority)}</td>
          <td>${sbadge(r.status)}</td>
          <td><button class="btn btn-sm" onclick="selectReq(${i})"><i class="ti ti-eye" style="font-size:13px"></i>Review</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`}`;
}

function buildDetail() {
  const r = state.selectedReq;
  return `
  <button class="btn" style="margin-bottom:16px" onclick="backToList()">
    <i class="ti ti-arrow-left" style="font-size:14px"></i>Back to list
  </button>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-weight:700;font-size:17px;margin-bottom:4px">${r.id}</div>
        <div style="font-size:13px;color:var(--text2)">${fmtDate(r.date_submitted)}</div>
      </div>
      ${sbadge(r.status)}
    </div>
    <div class="hr"></div>
    <div class="grid2" style="font-size:13px;gap:14px">
      ${[['Hospital',r.hospital,true],['Contact',r.contact,true],['Email',r.email,false],['Phone',r.phone||'—',false]].map(([l,v,b])=>`
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">${l}</div>
        <div style="font-weight:${b?600:400};color:${l==='Email'?'var(--blue)':'inherit'}">${v}</div>
      </div>`).join('')}
    </div>
    ${r.notes ? `<div style="margin-top:14px;font-size:13px;background:var(--bg2);padding:9px 12px;border-radius:6px"><span style="color:var(--text2)">Notes: </span>${r.notes}</div>` : ''}
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-pill" style="color:var(--blue)"></i>Requested Items
    </div>
    <table style="font-size:13px">
      <thead><tr><th>#</th><th>Item</th><th>Category</th><th>Qty</th><th>Unit</th></tr></thead>
      <tbody>
        ${r.items.map((it,i)=>`
        <tr>
          <td style="color:var(--text2)">${i+1}</td>
          <td style="font-weight:500">${it.name}</td>
          <td>${it.category}</td>
          <td>${it.qty}</td>
          <td>${it.unit}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:14px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-pencil" style="color:var(--blue)"></i>Action This Request
    </div>
    <div style="margin-bottom:12px">
      <label>Update status</label>
      <select onchange="state.adminStatus=this.value">
        ${['pending','processing','fulfilled','cancelled'].map(s=>`<option value="${s}" ${state.adminStatus===s?'selected':''}>${cap(s)}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:16px">
      <label>Response note to hospital</label>
      <textarea rows="3" placeholder="e.g. Items dispatched via courier. ETA 2 working days." oninput="state.adminNote=this.value" style="resize:vertical">${state.adminNote}</textarea>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="backToList()">Cancel</button>
      <button class="btn btn-primary" onclick="actionRequest()" ${state.busy?'disabled':''}>
        ${state.busy?'<span class="spinner"></span>Saving…':'<i class="ti ti-check" style="font-size:13px"></i>Save &amp; Notify Hospital'}
      </button>
    </div>
  </div>`;
}

// ── Event handlers (global) ───────────────────────────────────────────────────
function attachEvents() {
  // API input live update
  const inp = document.getElementById('apiInput');
  if (inp) inp.addEventListener('input', e => { state.apiUrl = e.target.value.replace(/\/$/, ''); });
}

function connectApi() {
  const inp = document.getElementById('apiInput');
  if (inp) state.apiUrl = inp.value.replace(/\/$/, '');
  pingHealth();
}

function setView(v) {
  state.mainView = v;
  if (v === 'admin') loadAdmin();
  else render();
}
function setHospTab(t) { setState({ hospTab: t }); }

function updForm(k, v) { state.form[k] = v; }
function clearForm() { setState({ form: blankForm() }); }

function addItem() {
  state.form.items.push(blankItem());
  render();
}
function remItem(i) {
  state.form.items.splice(i, 1);
  render();
}
function updItem(i, k, v) { state.form.items[i][k] = v; }

function selectReq(i) {
  const r = state.allRequests[i];
  setState({ selectedReq: r, adminNote: r.admin_note || '', adminStatus: r.status, adminTab: 'detail' });
}
function backToList() { setState({ adminTab: 'list', selectedReq: null }); }

// ── Boot ──────────────────────────────────────────────────────────────────────
render();
pingHealth();
</script>
</body>
</html>
